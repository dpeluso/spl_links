# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: default

# HTML Language setting
lang: "en"

# Plugins, implemented in ./plugins/PLUGIN_NAME
# Use {{ vars.PLUGIN_NAME }} in the settings below

# The output of the plugin can be used below, e.g., {{vars.GithubRepoStarsCountPlugin}}
plugins:
  # Automatically fetch Github repo star count
  - GithubRepoStarsCountPlugin:
      - ZhgChgLi/ZMarkupParser
      - ZhgChgLi/ZReviewTender
      - ZhgChgLi/ZMediumToMarkdown
      - ZhgChgLi/linkyee

# Google Analytics tracking id
google_analytics_id:

# HTML Title
title: "Daniel Peluso's Links"

# Avatar image path
avatar: "./images/Daniel Peluso - Selfie_small.jpeg"

# Name section text
name: "@dpeluso"

# Tagline section text
tagline: >-
    Turning data into actionable insights as a Splunk Partner Tech Manager. Let's connect and explore the power of data!

# List of links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# text: The displayed text for the link
# title: The url title
# url: The URL of the link
# alt: Alternative text for accessibility
# target: `_blank` opens in a new tab, `_self` opens in the same frame
links:
  - link:
      icon: "fa-brands fa-medium"
      text: "Subscribe to Splunk Partner Pulse"
      url: "https://discover.splunk.com/Partner-Newsletter-Subscription.html"
      alt: "Subscribe"
      title: "Subscribe to Splunk Partner Pulse"
      target: "_blank"


# List of social media links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# title: The url title
# url: The URL of the social media link
# alt: Alternative text for accessibility
# target: _blank opens in a new tab, _self opens in the same frame
socials:
  - social:
      icon: "fa-brands fa-github"
      url: "https://github.com/dpeluso"
      title: "Daniel Peluso's GitHub"
      alt: "dpeluso's GitHub"
      target: "_blank"
  - social:
      icon: "fa-brands fa-linkedin"
      url: "https://www.linkedin.com/in/danielpeluso/"
      title: "Daniel Peluso's LinkedIn"
      alt: "Daniel Peluso's LinkedIn"
      target: "_blank"
  - social:
      icon: "fa-solid fa-envelope"
      url: "mailto:dpeluso@cisco.com"
      title: "Email: dpeluso@cisco.com"
      alt: "dpeluso@cisco.com"
      target: "_blank"

# Footer text
footer: >
    Hi there! Follow me on GitHub, or stay connected on LinkedIn or Email.

# Footer copyright message
copyright: >
  © 2024  <a href="https://link.zhgchg.li" target="_blank">ZhgChgLi</a>. 
  Powered by <a href="https://github.com/ZhgChgLi/linkyee" target="_blank">linkyee</a>
