# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: splunk

# HTML Language setting
lang: "en"

# Plugins, implemented in ./plugins/PLUGIN_NAME
# Use {{ vars.PLUGIN_NAME }} in the settings below

# The output of the plugin can be used below, e.g., {{vars.GithubRepoStarsCountPlugin}}
plugins:
  # Automatically fetch Github repo star count
  - GithubRepoStarsCountPlugin:
      - ZhgChgLi/ZMarkupParser
      - ZhgChgLi/ZReviewTender
      - ZhgChgLi/ZMediumToMarkdown
      - ZhgChgLi/linkyee

# Google Analytics tracking id
google_analytics_id:

# Splunk Real User Monitoring (RUM) for SPA monitoring
# Docs: https://help.splunk.com/en/splunk-observability-cloud/monitor-end-user-experience/real-user-monitoring/monitor-single-page-applications
# Note: RUM access tokens are public in browser code; use a dedicated RUM token.
splunk_rum:
    enabled: true
    script_url: "https://cdn.signalfx.com/splunk-otel-web.js"
    realm: "us0"
    rum_access_token: "a5OVE71NXiRkCYxH34_Fbw"
    application_name: "dpeluso-linkyee"
    deployment_environment: "production"
    spa_metrics: true

# HTML Title
title: "Daniel Peluso's Links"

# Avatar image path
avatar: "./images/profile_dpeluso.jpeg"

# Name section text
name: "@dpeluso"

# Tagline section text
tagline: >-
    Turning data into actionable insights as a Splunk Partner Tech Manager. Let's connect and explore the power of data!

